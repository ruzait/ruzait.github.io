<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#9b59b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background circle (optional) -->
  <circle cx="32" cy="32" r="30" fill="#0a0a0a" stroke="url(#grad)" stroke-width="2"/>
  
  <!-- R -->
  <text x="4" y="42" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="url(#grad)" filter="url(#glow)">R</text>
  
  <!-- Z -->
  <text x="22" y="42" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="url(#grad)" filter="url(#glow)">Z</text>
  
  <!-- D -->
  <text x="40" y="42" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="url(#grad)" filter="url(#glow)">D</text>
  
  <!-- Accent -->
  <circle cx="52" cy="20" r="3" fill="#00f5ff" filter="url(#glow)" opacity="0.8"/>
  <circle cx="12" cy="50" r="2" fill="#9b59b6" filter="url(#glow)" opacity="0.7"/>
</svg>