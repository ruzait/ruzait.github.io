<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <defs>
    <!-- Primary gradient -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4ecdc4;stop-opacity:1" />
    </linearGradient>
    
    <!-- Purple gradient -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    
    <!-- Electric gradient -->
    <linearGradient id="electricGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9b59b6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00f5ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background (optional - remove for transparent) -->
  <!-- <rect width="400" height="150" fill="#0a0a0a" rx="10"/> -->
  
  <!-- Group: Logo mark + Text -->
  <g transform="translate(10, 10)">
    
    <!-- Abstract lightning/circuit element -->
    <path d="M 20 75 L 50 75 L 70 40 L 95 75 L 130 75 L 110 110 L 145 110" 
          fill="none" 
          stroke="url(#electricGrad)" 
          stroke-width="3" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          filter="url(#glow)"
          opacity="0.6"/>
    
    <!-- Electric dots/nodes -->
    <circle cx="20" cy="75" r="4" fill="url(#primaryGrad)" filter="url(#glow)"/>
    <circle cx="95" cy="55" r="3" fill="url(#purpleGrad)" filter="url(#glow)"/>
    <circle cx="145" cy="110" r="4" fill="url(#primaryGrad)" filter="url(#glow)"/>
    
    <!-- Letter R - Bold geometric -->
    <g transform="translate(35, 25)" filter="url(#shadow)">
      <path d="M 0 0 L 0 100 L 8 100 L 8 70 L 25 70 L 25 100 L 33 100 L 33 0 L 25 0 L 25 55 L 8 55 L 8 0 Z" 
            fill="url(#primaryGrad)"/>
      <path d="M 8 0 L 8 55 L 25 55 L 25 0 Z" 
            fill="#0a0a0a" 
            opacity="0.3"/>
      <!-- R leg curve -->
      <path d="M 25 55 Q 40 55 40 70 Q 40 85 25 85 L 8 85 L 8 70 L 25 70" 
            fill="url(#primaryGrad)"/>
    </g>
    
    <!-- Letter Z - Bold geometric -->
    <g transform="translate(90, 25)" filter="url(#shadow)">
      <path d="M 0 0 L 55 0 L 55 8 L 10 92 L 55 92 L 55 100 L 0 100 L 0 92 L 45 92 L 0 8 Z" 
            fill="url(#purpleGrad)"/>
      <!-- Z cutout effect -->
      <path d="M 8 8 L 45 8 L 45 15 L 8 15 Z" fill="#0a0a0a" opacity="0.2"/>
      <path d="M 8 85 L 47 85 L 47 92 L 8 92 Z" fill="#0a0a0a" opacity="0.2"/>
    </g>
    
    <!-- Letter D - Bold geometric with circuit feel -->
    <g transform="translate(160, 25)" filter="url(#shadow)">
      <!-- Main D shape -->
      <path d="M 0 0 L 0 100 L 10 100 L 10 0 Z M 10 0 L 10 100 L 18 100 L 45 85 L 45 15 L 18 0 Z" 
            fill="url(#primaryGrad)"/>
      <!-- Inner D cutout -->
      <path d="M 18 12 L 35 20 L 35 80 L 18 88 L 18 12" fill="#0a0a0a" opacity="0.4"/>
      <!-- Circuit node on D -->
      <circle cx="45" cy="50" r="8" fill="url(#purpleGrad)" filter="url(#glow)"/>
      <circle cx="45" cy="50" r="4" fill="#0a0a0a"/>
      <circle cx="45" cy="50" r="2" fill="url(#primaryGrad)"/>
    </g>
    
    <!-- Connecting line between letters -->
    <line x1="78" y1="50" x2="88" y2="50" stroke="url(#electricGrad)" stroke-width="2" filter="url(#glow)"/>
    <line x1="148" y1="50" x2="158" y2="50" stroke="url(#electricGrad)" stroke-width="2" filter="url(#glow)"/>
    
    <!-- Accent particles -->
    <circle cx="210" cy="30" r="2" fill="#00f5ff" opacity="0.8"/>
    <circle cx="225" cy="120" r="1.5" fill="#9b59b6" opacity="0.8"/>
    <circle cx="240" cy="45" r="1" fill="#667eea" opacity="0.6"/>
    <circle cx="200" cy="110" r="1.5" fill="#4ecdc4" opacity="0.7"/>
    
  </g>
</svg>